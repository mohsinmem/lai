[build]
  command = "node node_modules/vite/bin/vite.js build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."orion-scout-background"]
  schedule = "*/15 * * * *"

[functions."notebooklm-synthesis-background"]
  schedule = "*/15 * * * *"

[functions."research-scheduler"]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
